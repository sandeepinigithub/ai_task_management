<div class="users-container container-fluid py-4" *appShowGridAction="getActionPermissions('Portal.UserManagement.Users');permissonValue: 'view'">
  <!-- Page Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold text-dark">User Management</h4>
    <div class="d-flex align-items-center gap-2">
      <p-button label="New User" icon="pi pi-plus" severity="primary" (click)="openNewUser()" />
      <p-tieredmenu #menu [model]="menuItems()" [popup]="true" appendTo="body" />
      <p-button
        icon="pi pi-ellipsis-v"
        [rounded]="true"
        severity="secondary"
        [text]="true"
        (click)="menu.toggle($event)"
      />
    </div>
  </div>

  <!-- Filters -->
  <div class="card mb-3 filter-card">
    <div class="p-3">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-6">
          <label class="d-block small text-muted mb-1">Search</label>
          <p-inputgroup>
            <p-inputgroup-addon><i class="pi pi-search"></i></p-inputgroup-addon>
            <input
              pInputText
              placeholder="Search by username"
              [(ngModel)]="searchText"
              (input)="onSearch()"
              class="w-100"
            />
          </p-inputgroup>
        </div>
        <div class="col-12 col-md-3">
          <label class="d-block small text-muted mb-1">Role</label>
          <p-select
            [options]="roleOptions"
            [(ngModel)]="selectedRole"
            placeholder="All Roles"
            [showClear]="true"
            (onChange)="applyFilters()"
            styleClass="w-100"
          />
        </div>
        <div class="col-12 col-md-3">
          <p-button
            label="Clear Filters"
            [text]="true"
            severity="secondary"
            (click)="clearFilters()"
            styleClass="w-100"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card table-card">
    <p-table
      [value]="primengTableHelper.records"
      [loading]="primengTableHelper.isLoading"
      [paginator]="true"
      [rows]="primengTableHelper.defaultRecordsCountPerPage"
      [(first)]="first"
      [totalRecords]="primengTableHelper.totalRecordsCount"
      [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage"
      class="p-datatable-sm"
      [tableStyle]="{ 'min-width': '50rem' }"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="min-width: 14rem">USERNAME</th>
          <th style="min-width: 16rem">EMAIL</th>
          <th style="width: 10rem">ROLE</th>
          <th style="width: 8rem">STATUS</th>
          <th style="width: 6rem">ACTIONS</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <div class="d-flex align-items-center gap-2">
              <span class="fw-semibold">{{ user.username }}</span>
            </div>
          </td>
          <td class="text-muted small">{{ user.email }}</td>
          <td>
            <p-tag
              [value]="getRoleLabel(user.role + '')"
              [severity]="getRoleSeverity(user.role + '')"
            />
          </td>
          <td>
            <p-tag
              [value]="user.isActive ? 'Active' : 'Inactive'"
              [severity]="user.isActive ? 'success' : 'danger'"
            />
          </td>
          <td>
            <div class="d-flex gap-1">
              <p-button
                icon="pi pi-eye"
                [text]="true"
                severity="primary"
                size="small"
                (click)="viewUser(user)"
                pTooltip="View"
                tooltipPosition="top"
              />
              <p-button
                icon="pi pi-pencil"
                [text]="true"
                severity="info"
                size="small"
                (click)="openEditUser(user)"
                pTooltip="Edit"
                tooltipPosition="top"
              />
              <p-button
                icon="pi pi-trash"
                [text]="true"
                severity="danger"
                size="small"
                (click)="deleteUser(user)"
                pTooltip="Delete"
                tooltipPosition="top"
              />
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-5">
            <div class="text-muted">
              <i class="pi pi-users fs-1 d-block mb-2"></i>
              <p class="mb-0">No users found</p>
              <small>Try adjusting your filters or create a new user</small>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast />
