<div class="login-container">
  <div class="login-box">
    <!-- Left: Branding -->
    <div class="login-image">
      <img src="assets/images/lorem-ipsum-logo-orange.png" alt="Brand Logo" width="220" />
    </div>

    <!-- Right: Form -->
    <div class="login-form-section">
      <div class="logo-container">
        <img src="assets/images/lorem-ipsum-logo-orange.png" alt="App Logo" class="login-logo" />
      </div>

      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Please enter your credentials to continue</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSignin()">
        <!-- Username / Email -->
        <div class="form-group">
          <p-inputgroup>
            <p-inputgroup-addon>
              <i class="pi pi-user"></i>
            </p-inputgroup-addon>
            <input
              pInputText
              type="text"
              placeholder="Email"
              formControlName="email"
              autocomplete="off"
            />
          </p-inputgroup>
          <app-validation-message [formCtrl]="loginForm.get('email')" [type]="'Email'" />
        </div>

        <!-- Password -->
        <div class="form-group">
          <p-inputgroup>
            <p-inputgroup-addon>
              <i class="pi pi-lock"></i>
            </p-inputgroup-addon>
            <input
              pInputText
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Password"
              formControlName="password"
            />
            <p-inputgroup-addon class="password-toggle" (click)="showPassword = !showPassword">
              <i [ngClass]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
            </p-inputgroup-addon>
          </p-inputgroup>
          <app-validation-message [formCtrl]="loginForm.get('password')" [type]="'Password'" />
        </div>

        <!-- Submit -->
        <div class="button-container text-center">
          <p-button
            type="submit"
            label="Log In"
            icon="pi pi-sign-in"
            styleClass="w-full"
            [disabled]="isSubmitLoader"
            [loading]="isSubmitLoader"
          />
        </div>

        <!-- Register Link -->
        <div class="register-link">
          Don't have an account?
          <a (click)="showRegisterModal = true">Create Account</a>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Register Modal -->
<p-dialog
  [(visible)]="showRegisterModal"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [maximizable]="true"
  header="Create Account"
  styleClass="register-dialog"
  [style]="{ width: '480px' }"
>
  <app-register (onClose)="showRegisterModal = false" />
</p-dialog>

<p-toast />
